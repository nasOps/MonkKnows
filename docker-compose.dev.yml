services:
  db:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: monkknows_dev
      POSTGRES_USER: monkknows
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monkknows -d monkknows_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    init: true # Ensures proper signal handling and graceful shutdown
    build:
      context: ./ruby-sinatra
      target: build # Use build stage from Dockerfile
      args:
        BUNDLE_WITHOUT: ""        # overrides 'development test'
    ports:
      - "4567:4567"
    volumes:
      - ./ruby-sinatra:/app          # hot-reload: local code is mounted to container
    env_file:
      - ./ruby-sinatra/.env
    environment:
      - RACK_ENV=development
      - DB_HOST=db
      - DB_USER=monkknows
      - DB_PASSWORD=dev_password
      - DB_NAME=monkknows_dev
    depends_on:
      db:
        condition: service_healthy
    # Overrides CMD in Dockerfile to use rerun for hot-reloading
    command: sh -c "bundle exec rake db:schema:load 2>/dev/null; bundle exec rake db:migrate 2>/dev/null; ruby db/migrate_to_tsvector.rb 2>/dev/null; ruby app.rb & bundle exec guard --no-interactions --no-bundler-warning"

volumes:
  pgdata:
