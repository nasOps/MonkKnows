name: Ruby CI (Build & Test)

# Workflow triggers
on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

  workflow_dispatch:

jobs:
  # Lint Dockerfile
  lint-dockerfile:
    name: Lint Dockerfile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd


      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5
        with:
          dockerfile: ruby-sinatra/Dockerfile

  build-test:
    runs-on: ubuntu-latest
    needs: lint-dockerfile # Awaits linting of Dockerfile before building and testing

    defaults:
      run:
        working-directory: ruby-sinatra # Because ci.yaml is in the root

    steps:
      # Checkout repository
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # Install Ruby
      - name: Set up Ruby
        uses: ruby/setup-ruby@09a7688d3b55cf0e976497ff046b70949eeaccfd
        with:
          ruby-version: '3.2.3'
          bundler-cache: true  # cacher gems automatically for faster builds
          working-directory: ruby-sinatra

      - name: Run RuboCop
        run: bundle exec rubocop

      # Run  tests
      - name: Run tests
        run: bundle exec rspec # RSpec = test framework for Ruby

  # Smoke test: Verifies that the app is operational after CI build and test
  # Spins up the app locally on the runner and checks for HTTP 200 on localhost:4567
  smoke-test-ci:
    runs-on: ubuntu-latest
    needs: build-test  # Only runs if build-test succeeds

    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Create dummy database
        run: touch whoknows.db

      - name: Create .env file for CI
        run: |
          cat > ruby-sinatra/.env << EOF
          SESSION_SECRET=${{ secrets.SESSION_SECRET }}
          OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}
          RACK_ENV=test
          EOF

      - name: Start app with Docker Compose
        run: docker compose -f docker-compose.dev.yml up -d

      - name: Wait for app to be ready
        run: sleep 10

      - name: Run smoke test with cURL
        run: |
          URL="http://localhost:4567/"
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}\n" $URL)
          if [ $HTTP_STATUS -eq 200 ]; then
            echo "✅ CI Smoke test passed (status: $HTTP_STATUS)"
          else
            echo "❌ CI Smoke test failed (status: $HTTP_STATUS)"
            exit 1
          fi

      - name: Tear down app
        if: always()  # Cleans up
        run: docker compose -f docker-compose.dev.yml down