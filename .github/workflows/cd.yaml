name: Ruby CD (Build & Push to GHCR)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  CR_PAT: ${{ secrets.GH_PAT_sobr0002 }}
  DOCKER_GITHUB_USERNAME: ${{ secrets.DOCKER_GITHUB_USERNAME }}

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      # Fetch the repository code onto the runner
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # Enable multi-platform Docker builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      # Authenticate with GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7519a1c44
        with:
          registry: ghcr.io
          username: ${{ env.DOCKER_GITHUB_USERNAME }}
          password: ${{ env.CR_PAT }}

      # Generate tags: latest, git SHA, and semver on release
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804
        with:
          images: ghcr.io/${{ env.DOCKER_GITHUB_USERNAME }}/monkknows
          tags: |
            type=raw,value=latest
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # Build the production image and push it to GHCR
      - name: Build and Push Docker image
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4
        with:
          context: ruby-sinatra/
          file: ruby-sinatra/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
  trivy-scan:
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947e0f18c8ea63fd80e
        with:
          image-ref: ghcr.io/${{ env.DOCKER_GITHUB_USERNAME }}/monkknows:latest
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

  deploy:
    runs-on: ubuntu-latest
    needs: [build-push, trivy-scan]

    steps:
      # Fetch the repository code to access compose and config files
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # Save the private key and known hosts so SSH can authenticate with the server
      - name: Add SSH key to runner
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/ssh_key
          chmod 600 ~/.ssh/ssh_key
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts    

      # Build .env from GitHub Secrets - never stored in the repository
      - name: Create .env file
        run: |
          cat > .env <<'EOF'
          SESSION_SECRET=${{ secrets.SESSION_SECRET }}
          OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}
          EOF

      # Copy .env to server so docker compose can inject secrets at runtime
      - name: Transfer .env to server
        run: |
          scp -i ~/.ssh/ssh_key \
            .env ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/whoknows/app/.env

      # Copy compose file so the server always has the latest version with correct image tag (latest)
      - name: Transfer docker-compose.prod.yml to server
        run: |
          scp -i ~/.ssh/ssh_key \
            docker-compose.prod.yml \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/whoknows/app/docker-compose.prod.yml

      # Copy nginx config so the server always has the latest version
      - name: Transfer nginx.conf to server
        run: |
          scp -i ~/.ssh/ssh_key \
            nginx.conf \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/whoknows/app/nginx.conf

      # Pull the latest image from GHCR and restart containers
      # set -euo pipefail = fail fast if any command fails, prevents silent errors
      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/ssh_key \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << "EOF"
            set -euo pipefail
            cd /opt/whoknows/app
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
          EOF

  # Smoke test: Verifies that the production server is operational after deployment
  # Checks for HTTP 200 directly on the production server
  smoke-test-cd:
    runs-on: ubuntu-latest
    needs: deploy  # Only runs if deploy succeeds

    steps:
      # Hit the production server and verify it responds with HTTP 200
      - name: Run smoke test on production
        run: |
          URL="https://monkknows.dk"
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}\n" -L $URL)
          if [ $HTTP_STATUS -eq 200 ]; then
            echo "✅ CD Smoke test passed (status: $HTTP_STATUS)"
          else
            echo "❌ CD Smoke test failed (status: $HTTP_STATUS)"
            exit 1
          fi