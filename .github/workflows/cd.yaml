name: Ruby CD (Build & Push to GHCR)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  CR_PAT: ${{ secrets.GH_PAT_sobr0002 }}
  DOCKER_GITHUB_USERNAME: ${{ secrets.DOCKER_GITHUB_USERNAME }}

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      # Fetch the repository code onto the runner
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # Enable multi-platform Docker builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      # Authenticate with GitHub Container Registry
      - name: Log in to GHCR
        run: echo ${{ env.CR_PAT }} | docker login ghcr.io -u ${{ env.DOCKER_GITHUB_USERNAME }} --password-stdin

      # Build the production image and push it to GHCR
      - name: Build and Push Docker image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --push \
            -t ghcr.io/${{ env.DOCKER_GITHUB_USERNAME }}/monkknows:latest \
            -f ruby-sinatra/Dockerfile \
            ruby-sinatra/
  deploy:
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      # Fetch the repository code to access compose and config files
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # Write the private key to disk and restrict its permissions
      - name: Add SSH key to runner
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/ssh_key
          chmod 600 ~/.ssh/ssh_key

      # Build .env from GitHub Secrets - never stored in the repository
      - name: Create .env file
        run: |
          echo "SESSION_SECRET=${{ secrets.SESSION_SECRET }}" >> .env
          echo "OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}" >> .env

      # Copy .env to server so docker compose can inject secrets at runtime
      - name: Transfer .env to server
        run: |
          scp -i ~/.ssh/ssh_key -o StrictHostKeyChecking=no \
            .env ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:.env

      # Copy compose file so the server always has the latest version with correct image tag (latest)
      - name: Transfer docker-compose.prod.yml to server
        run: |
          scp -i ~/.ssh/ssh_key -o StrictHostKeyChecking=no \
            docker-compose.prod.yml \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:docker-compose.yml

      # Copy nginx config so the server always has the latest version
      - name: Transfer nginx.conf to server
        run: |
          scp -i ~/.ssh/ssh_key -o StrictHostKeyChecking=no \
            nginx.conf \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:nginx.conf

      # Pull the latest image from GHCR and restart containers
      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/ssh_key -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << "EOF"
            docker compose pull
            docker compose up -d --remove-orphans
          EOF

  # Smoke test: Verifies that the production server is operational after deployment
  # Checks for HTTP 200 directly on the production server
  smoke-test-cd:
    runs-on: ubuntu-latest
    needs: deploy  # Only runs if deploy succeeds

    steps:
      # Hit the production server and verify it responds with HTTP 200
      - name: Run smoke test on production
        run: |
          URL="http://4.225.161.111/"
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}\n" $URL)
          if [ $HTTP_STATUS -eq 200 ]; then
            echo "✅ CD Smoke test passed (status: $HTTP_STATUS)"
          else
            echo "❌ CD Smoke test failed (status: $HTTP_STATUS)"
            exit 1
          fi