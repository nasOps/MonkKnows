name: CI — Continuous Integration

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # --- Fast quality gates (parallel) ---

  bundler-audit:
    name: Bundler Audit
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ruby-sinatra

    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Ruby
        uses: ruby/setup-ruby@09a7688d3b55cf0e976497ff046b70949eeaccfd
        with:
          ruby-version: '3.2.3'
          bundler-cache: true
          working-directory: ruby-sinatra

      - name: Install bundler-audit
        run: gem install bundler-audit

      - name: Run bundler-audit
        run: bundle audit check --update

  brakeman:
    name: Brakeman
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ruby-sinatra

    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Ruby
        uses: ruby/setup-ruby@09a7688d3b55cf0e976497ff046b70949eeaccfd
        with:
          ruby-version: '3.2.3'
          bundler-cache: true
          working-directory: ruby-sinatra

      - name: Install brakeman
        run: gem install brakeman

      - name: Run brakeman
        run: brakeman --no-pager --force

  lint-dockerfile:
    name: Hadolint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5
        with:
          dockerfile: ruby-sinatra/Dockerfile

  # --- Build & test (depends on all quality gates) ---

  build-test:
    name: build-test
    runs-on: ubuntu-latest
    needs: [bundler-audit, brakeman, lint-dockerfile]

    defaults:
      run:
        working-directory: ruby-sinatra

    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Ruby
        uses: ruby/setup-ruby@09a7688d3b55cf0e976497ff046b70949eeaccfd
        with:
          ruby-version: '3.2.3'
          bundler-cache: true
          working-directory: ruby-sinatra

      - name: Run RuboCop
        run: bundle exec rubocop

      - name: Run tests
        run: bundle exec rspec

  # --- Smoke test (depends on build-test) ---

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Create dummy database
        run: touch whoknows.db

      - name: Create .env file for CI
        run: |
          cat > ruby-sinatra/.env << EOF
          SESSION_SECRET=${{ secrets.SESSION_SECRET }}
          OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}
          RACK_ENV=test
          EOF

      - name: Start app with Docker Compose
        run: docker compose -f docker-compose.dev.yml up -d

      - name: Run smoke test with cURL
        run: |
          URL="http://localhost:4567/"
          echo "Waiting for app to be ready..."
          for i in $(seq 1 46); do
            HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}\n" $URL 2>/dev/null || echo "000")
            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "✅ CI Smoke test passed (status: $HTTP_STATUS)"
              exit 0
            fi
            echo "Attempt $i: not ready yet (status: $HTTP_STATUS), waiting 2s..."
            sleep 2
          done
          echo "❌ CI Smoke test failed — app did not respond with 200 within 92s"
          exit 1

      - name: Tear down app
        if: always()
        run: docker compose -f docker-compose.dev.yml down