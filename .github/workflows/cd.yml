name: CD — Continuous Delivery & Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  CR_PAT: ${{ secrets.GH_PAT_sobr0002 }}
  DOCKER_GITHUB_USERNAME: ${{ secrets.DOCKER_GITHUB_USERNAME }}

jobs:
  # --- Continuous Delivery: build, scan, push artifact to GHCR ---

  deliver:
    name: Build, Scan & Push to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7519a1c44
        with:
          registry: ghcr.io
          username: ${{ env.DOCKER_GITHUB_USERNAME }}
          password: ${{ env.CR_PAT }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804
        with:
          images: ghcr.io/${{ env.DOCKER_GITHUB_USERNAME }}/monkknows
          tags: |
            type=raw,value=latest
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # Build locally without pushing — image stays on runner for scanning
      - name: Build Docker image
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4
        with:
          context: ruby-sinatra/
          file: ruby-sinatra/Dockerfile
          platforms: linux/amd64
          load: true
          tags: ${{ steps.meta.outputs.tags }}

      # Scan the local image before pushing — blocks vulnerable images from reaching GHCR
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947e0f18c8ea63fd80e
        with:
          image-ref: ghcr.io/${{ env.DOCKER_GITHUB_USERNAME }}/monkknows:latest
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

      # Push the same scanned image — no rebuild
      - name: Push Docker image to GHCR
        run: |
          echo "${{ steps.meta.outputs.tags }}" | while IFS= read -r tag; do
            [ -n "$tag" ] && docker push "$tag"
          done

  # --- Continuous Deployment: deploy to production server ---

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deliver

    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Add SSH key to runner
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/ssh_key
          chmod 600 ~/.ssh/ssh_key
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Create .env file
        run: |
          cat > .env <<'EOF'
          SESSION_SECRET=${{ secrets.SESSION_SECRET }}
          OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}
          EOF

      - name: Transfer .env to server
        run: |
          scp -i ~/.ssh/ssh_key \
            .env ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/whoknows/app/.env

      - name: Transfer docker-compose.prod.yml to server
        run: |
          scp -i ~/.ssh/ssh_key \
            docker-compose.prod.yml \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/whoknows/app/docker-compose.prod.yml

      - name: Transfer nginx.conf to server
        run: |
          scp -i ~/.ssh/ssh_key \
            nginx.conf \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/whoknows/app/nginx.conf

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/ssh_key \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << "EOF"
            set -euo pipefail
            cd /opt/whoknows/app
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
          EOF

  # --- Post-deploy verification ---

  smoke-test:
    name: Production Smoke Test
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Run smoke test on production
        run: |
          URL="https://monkknows.dk"
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}\n" -L $URL)
          if [ $HTTP_STATUS -eq 200 ]; then
            echo "✅ CD Smoke test passed (status: $HTTP_STATUS)"
          else
            echo "❌ CD Smoke test failed (status: $HTTP_STATUS)"
            exit 1
          fi
