name: CF — Continuous Feedback

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  owasp-zap:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ruby-sinatra

    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Ruby
        uses: ruby/setup-ruby@e65c17d16e57e481586a6a5a0282698790062f92
        with:
          ruby-version: '3.2.3'
          bundler-cache: true
          working-directory: ruby-sinatra

      - name: Start Sinatra app
        run: |
          DATABASE_PATH=./whoknows.db \
          RACK_ENV=test \
          SESSION_SECRET=$(openssl rand -hex 32) \
          bundle exec ruby app.rb &

      - name: Wait for app to be ready
        run: |
          echo "Waiting for Sinatra to be ready..."
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:4567/health | grep -q "200"; then
              echo "App is ready!"
              exit 0
            fi
            echo "Attempt $i: not ready yet, waiting 2s..."
            sleep 2
          done
          echo "App did not start in time"
          exit 1

      - name: Run OWASP ZAP Baseline Scan
        run: |
          sudo chmod -R a+w $(pwd)
          docker run --rm \
            --add-host=host.docker.internal:host-gateway \
            -v $(pwd):/zap/wrk \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t http://host.docker.internal:4567 \
              -r zap-report.html \
              -J zap-report.json \
              -x zap-report.xml \
              -I || true

      - name: Upload ZAP Reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: zap-security-reports
          path: |
            ruby-sinatra/zap-report.html
            ruby-sinatra/zap-report.json
            ruby-sinatra/zap-report.xml
          retention-days: 30
