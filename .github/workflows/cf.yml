name: CF — Continuous Feedback

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  owasp-zap:

    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Create .env file
        run: |
          echo "SESSION_SECRET=$(openssl rand -hex 32)" > ruby-sinatra/.env
          echo "OPENWEATHER_API_KEY=dummy_key_for_ci" >> ruby-sinatra/.env

      - name: Start app with Docker Compose
        run: docker compose -f docker-compose.dev.yml up -d --build

      - name: Wait for app to be ready
        run: |
          echo "Waiting for app to be ready..."
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:4567/health | grep -q "200"; then
              echo "App is ready!"
              exit 0
            fi
            echo "Attempt $i: not ready yet, waiting 2s..."
            sleep 2
          done
          echo "App did not start in time"
          exit 1

      - name: Run OWASP ZAP Baseline Scan
        run: |
          sudo chmod -R a+w ruby-sinatra
          docker run --rm \
            --network=host \
            -v $(pwd)/ruby-sinatra:/zap/wrk \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t http://localhost:4567 \
              -r zap-report.html \
              -J zap-report.json \
              -x zap-report.xml \
              -I || true

      - name: Upload ZAP Reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: zap-security-reports
          path: |
            ruby-sinatra/zap-report.html
            ruby-sinatra/zap-report.json
            ruby-sinatra/zap-report.xml
          retention-days: 30

      - name: Tear down app
        if: always()
        run: docker compose -f docker-compose.dev.yml down
