# NOTE: This workflow requires a new GitHub secret: SSH_HOST_DB (IP/hostname of VM2).
# Add it under Settings → Secrets and variables → Actions before running this workflow.

name: CD — Monitoring Stack (VM2)

concurrency:
  group: cd-monitoring-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
    paths:
      - 'monitoring/**'
  workflow_dispatch:

jobs:
  # --- Deploy monitoring stack to VM2 ---

  deploy-monitoring:
    name: Deploy Monitoring to VM2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Add SSH key to runner
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/ssh_key
          chmod 600 ~/.ssh/ssh_key
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Transfer monitoring config to VM2
        run: |
          scp -i ~/.ssh/ssh_key -r \
            monitoring/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_DB }}:/opt/whoknows/monitoring/

      - name: Deploy monitoring stack on VM2
        run: |
          ssh -i ~/.ssh/ssh_key \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_DB }} << "EOF"
            set -euo pipefail
            cd /opt/whoknows/monitoring
            docker compose -f docker-compose.monitoring.yml up -d --pull always --remove-orphans
          EOF

  # --- Post-deploy verification ---

  smoke-test:
    name: Monitoring Smoke Test
    runs-on: ubuntu-latest
    needs: deploy-monitoring

    steps:
      - name: Check Prometheus readiness
        run: |
          URL="http://${{ secrets.SSH_HOST_DB }}:9090/-/ready"
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}\n" --max-time 10 "$URL")
          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "Prometheus smoke test passed (status: $HTTP_STATUS)"
          else
            echo "Prometheus smoke test failed (status: $HTTP_STATUS)"
            exit 1
          fi

      - name: Check Grafana health
        run: |
          URL="http://${{ secrets.SSH_HOST_DB }}:3000/api/health"
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}\n" --max-time 10 "$URL")
          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "Grafana smoke test passed (status: $HTTP_STATUS)"
          else
            echo "Grafana smoke test failed (status: $HTTP_STATUS)"
            exit 1
          fi
