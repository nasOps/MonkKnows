name: OWASP ZAP Security Scan

on:
  push:
    branches: [ main, development ]
  pull_request:
    branches: [ main, development ]

  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  zap-scan:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ruby-sinatra

    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Ruby
        uses: ruby/setup-ruby@09a7688d3b55cf0e976497ff046b70949eeaccfd
        with:
          ruby-version: '3.2.3'
          bundler-cache: true
          working-directory: ruby-sinatra

      - name: Start Sinatra app
        run: |
          DATABASE_PATH=./whoknows.db \
          RACK_ENV=test \
          SESSION_SECRET=$(openssl rand -hex 32) \
          bundle exec ruby app.rb &

      # Poll /health up to 30 times (2s apart, max 60s) before allowing ZAP to start.
      # Exits 0 immediately on HTTP 200, exits 1 if the app never responds in time.
      - name: Wait for app to be ready
        run: |
          echo "Waiting for Sinatra to be ready..."
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:4567/health | grep -q "200"; then
              echo "App is ready!"
              exit 0
            fi
            echo "Attempt $i: not ready yet, waiting 2s..."
            sleep 2
          done
          echo "App did not start in time"
          exit 1

      - name: Run OWASP ZAP Baseline Scan
        run: |
          sudo chmod -R a+w $(pwd)
          docker run --rm \
            --add-host=host.docker.internal:host-gateway \
            -v $(pwd):/zap/wrk \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t http://host.docker.internal:4567 \
              -r zap-report.html \
              -J zap-report.json \
              -x zap-report.xml \
              -I || true

      # Upload all three reports as downloadable artifacts on the workflow run page.
      # if: always() ensures upload runs even if ZAP returned a non-zero exit code.
      # Paths are relative to repo root, not working-directory.
      - name: Upload ZAP Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-security-reports
          path: |
            ruby-sinatra/zap-report.html
            ruby-sinatra/zap-report.json
            ruby-sinatra/zap-report.xml
          retention-days: 30