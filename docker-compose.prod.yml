services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      # Mount certificates symlinks (live/) and actual cert files (archive/) so nginx can read certificates
      - /etc/letsencrypt/live/monkknows.dk:/etc/letsencrypt/live/monkknows.dk
      - /etc/letsencrypt/archive/monkknows.dk:/etc/letsencrypt/archive/monkknows.dk
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    depends_on:
      - web
    restart: unless-stopped

  web:
    image: ghcr.io/nasops/monkknows:latest
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.50'
    volumes:
      - /opt/whoknows/data/whoknows.db:/app/whoknows.db  # Database persistence
    environment:
      - RACK_ENV=production
      - DATABASE_PATH=/app/whoknows.db
      - SESSION_SECRET=${SESSION_SECRET}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
    restart: unless-stopped