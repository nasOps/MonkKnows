services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      # Mount certificates symlinks (live/) and actual cert files (archive/) so nginx can read certificates
      - /etc/letsencrypt/live/monkknows.dk:/etc/letsencrypt/live/monkknows.dk
      - /etc/letsencrypt/archive/monkknows.dk:/etc/letsencrypt/archive/monkknows.dk
    mem_limit: 128m
    cpus: 0.25
    depends_on:
      - web
    restart: unless-stopped

  web:
    image: ghcr.io/nasops/monkknows:latest
    volumes:
      - /opt/whoknows/data/logging:/app/db
    mem_limit: 256m
    cpus: 0.50
    environment:
      - RACK_ENV=production
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - SESSION_SECRET=${SESSION_SECRET}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
    restart: unless-stopped